# dbt/freight_analytics/profiles.yml
freight_analytics:
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST', '127.0.0.1') }}"
      user: de_user
      password: "{{ env_var('DBT_ENV_SECRET_DB_PASSWORD') }}"
      # Fixed: Quoting the entire Jinja expression prevents the YAML parser error
      port: "{{ env_var('DBT_PORT', '5433') | as_number }}"
      dbname: analytics
      schema: marts
      threads: 4
  target: dev

