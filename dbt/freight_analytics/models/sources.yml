version: 2

sources:
  - name: raw_freight
    database: analytics
    schema: public
    tables:
      - name: fct_shipment_tracking
        columns:
          - name: shipment_id
            tests:
              - not_null
          - name: current_status
            description: "The current lifecycle state of the shipment"
            tests:
              - not_null
              - accepted_values:
                  values: ['BOOKED', 'PICKED_UP', 'IN_TRANSIT', 'DELIVERED']
          - name: last_update
            tests:
              - not_null
freshness:
  warn_after: {count: 1, period: hour}
  error_after: {count: 2, period: hour}
  loaded_at_field: last_update
